<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wife's Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-btn { border-color: #e11d48; background-color: #fff1f2; color: #e11d48; }
        /* Hide scrollbar for cleaner look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900">
    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-white">
        
        <div class="bg-gradient-to-br from-rose-500 to-rose-600 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 id="rotation-step" class="text-xs font-bold uppercase tracking-widest opacity-80">Day 1 of 5</h1>
                    <div id="current-focus" class="text-3xl font-black leading-tight">Quads</div>
                </div>
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-sm text-xl">⚡</div>
            </div>
        </div>

        <div class="p-6 -mt-4 bg-white rounded-t-[2rem]">
            <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest text-center">Select Exercise</p>
            <div id="exercise-suggestions" class="flex flex-wrap gap-2 mb-8 justify-center">
                </div>

            <div class="bg-slate-100 p-5 rounded-[2rem] mb-6 space-y-4">
                <input id="exercise" type="text" placeholder="Select above..." class="w-full bg-white p-4 rounded-2xl border-none shadow-sm font-bold text-rose-600 placeholder:font-normal placeholder:text-slate-400">
                
                <div class="flex gap-3">
                    <div class="flex-1 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 text-center">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Weight (kg)</label>
                        <input id="weight" type="number" step="0.5" class="w-full text-center text-xl font-bold bg-transparent outline-none" placeholder="0">
                    </div>
                    <div class="flex-1 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 text-center">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Reps</label>
                        <input id="reps" type="number" class="w-full text-center text-xl font-bold bg-transparent outline-none" placeholder="0">
                    </div>
                </div>
                <button onclick="saveWorkout()" class="w-full bg-rose-500 text-white p-4 rounded-2xl font-black shadow-lg shadow-rose-200 active:scale-95 transition-all">LOG SET</button>
            </div>

            <button onclick="advanceRotation()" class="w-full mb-8 border-2 border-slate-200 text-slate-500 py-3 rounded-2xl font-bold text-sm hover:bg-slate-50 transition-colors">
                Finish Workout & Next Focus →
            </button>

            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black text-slate-800 text-lg">Recent History</h2>
                <button onclick="clearAll()" class="text-[9px] font-bold text-slate-400 hover:text-red-400 uppercase">Clear All</button>
            </div>
            
            <div id="history" class="space-y-3 max-h-64 overflow-y-auto pr-1 no-scrollbar">
                </div>
        </div>
    </div>

    <script>
        const rotation = [
            { name: "Quads", moves: ["Smith Machine Squats", "Leg Press", "Leg Extension", "Bulgarian Split Squats"] },
            { name: "Hamstrings/Glutes", moves: ["Stiff Legged Deadlift", "Hip Thrusts", "Leg Curls", "Deadlift"] },
            { name: "Upper Body", moves: ["Lat Pull Down", "Cable Row", "Lateral Raises", "Bicep Cable Curl", "Tricep Pushdown"] },
            { name: "Quads", moves: ["Smith Machine Squats", "Leg Press", "Leg Extension", "Bulgarian Split Squats"] },
            { name: "Hamstrings/Glutes", moves: ["Stiff Legged Deadlift", "Hip Thrusts", "Leg Curls", "Deadlift"] }
        ];

        let currentIdx = parseInt(localStorage.getItem('rotationIdx') || '0');

        function updateUI() {
            const focus = rotation[currentIdx];
            document.getElementById('current-focus').innerText = focus.name;
            document.getElementById('rotation-step').innerText = `Day ${currentIdx + 1} of 5`;
            
            const suggestContainer = document.getElementById('exercise-suggestions');
            suggestContainer.innerHTML = focus.moves.map(move => `
                <button onclick="fillExercise(this, '${move}')" class="bg-slate-50 text-slate-600 px-3 py-2 rounded-xl text-xs font-bold border-2 border-transparent transition-all shadow-sm">
                    ${move}
                </button>
            `).join('');
            renderLogs();
        }

        function fillExercise(btn, name) {
            document.querySelectorAll('#exercise-suggestions button').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            document.getElementById('exercise').value = name;
        }

        function advanceRotation() {
            if(confirm("Great job! Move to the next focus day?")) {
                currentIdx = (currentIdx + 1) % 5;
                localStorage.setItem('rotationIdx', currentIdx);
                updateUI();
                document.getElementById('exercise').value = '';
            }
        }

        function saveWorkout() {
            const ex = document.getElementById('exercise').value;
            const wt = document.getElementById('weight').value;
            const rp = document.getElementById('reps').value;
            if(!ex || !wt || !rp) return alert("Please enter kg and reps!");

            const log = {
                id: Date.now(),
                category: rotation[currentIdx].name,
                text: `${ex}: ${wt}kg x ${rp}`,
                date: new Date().toLocaleDateString(undefined, {month: 'short', day: 'numeric'})
            };

            let logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
            logs.unshift(log);
            localStorage.setItem('workoutLogs', JSON.stringify(logs));
            renderLogs();
            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
        }

        function deleteLog(id) {
            let logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
            logs = logs.filter(log => log.id !== id);
            localStorage.setItem('workoutLogs', JSON.stringify(logs));
            renderLogs();
        }

        function clearAll() {
            if(confirm("Clear all history?")) {
                localStorage.setItem('workoutLogs', '[]');
                renderLogs();
            }
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
            const container = document.getElementById('history');
            container.innerHTML = logs.map(log => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 group">
                    <div>
                        <p class="text-[10px] font-black text-rose-400 uppercase tracking-tighter">${log.category} • ${log.date}</p>
                        <p class="text-slate-800 font-bold">${log.text}</p>
                    </div>
                    <button onclick="deleteLog(${log.id})" class="text-slate-300 hover:text-red-400 p-2 transition-colors font-bold text-lg">✕</button>
                </div>
            `).join('');
        }

        updateUI();
    </script>
</body>
</html>
